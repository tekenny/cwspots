map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8090;
    server_name _;

    root /opt/cwspots/web;
    index index.html;

    # WebSocket proxy
    location /ws {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # Static files served directly by nginx
    location / {
        try_files $uri $uri/ @app;
    }

    location @app {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }
}

# HTTPS_BLOCK_START
server {
    listen 4443 ssl;
    server_name YOUR_TAILSCALE_HOSTNAME;

    ssl_certificate     /etc/nginx/ssl/ts.crt;
    ssl_certificate_key /etc/nginx/ssl/ts.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /opt/cwspots/web;
    index index.html;

    location /ws {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ @app;
    }

    location @app {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }
}
# HTTPS_BLOCK_END
